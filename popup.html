<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Speed Trainer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(165deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
      color: #e0e0e0;
      overflow: hidden;
    }

    .container {
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #00d4aa 0%, #00a080 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    /* Speed Display */
    .speed-display {
      background: linear-gradient(135deg, rgba(0, 212, 170, 0.1) 0%, rgba(0, 160, 128, 0.05) 100%);
      border: 1px solid rgba(0, 212, 170, 0.2);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .speed-display::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 212, 170, 0.05) 0%, transparent 60%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .speed-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #00d4aa;
      margin-bottom: 6px;
      position: relative;
    }

    .speed-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      position: relative;
      text-shadow: 0 0 30px rgba(0, 212, 170, 0.4);
    }

    .speed-value span {
      font-size: 22px;
      color: #00d4aa;
      margin-left: 2px;
    }

    /* Speed Controls */
    .speed-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .speed-btn {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .speed-btn.decrease {
      background: rgba(255, 82, 82, 0.15);
      color: #ff5252;
      border: 1px solid rgba(255, 82, 82, 0.3);
    }

    .speed-btn.decrease:hover {
      background: rgba(255, 82, 82, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 82, 82, 0.2);
    }

    .speed-btn.increase {
      background: rgba(0, 212, 170, 0.15);
      color: #00d4aa;
      border: 1px solid rgba(0, 212, 170, 0.3);
    }

    .speed-btn.increase:hover {
      background: rgba(0, 212, 170, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 212, 170, 0.2);
    }

    .speed-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Settings Section */
    .settings {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 12px;
      color: #888;
    }

    .setting-label strong {
      color: #ccc;
      font-weight: 600;
    }

    .setting-label small {
      display: block;
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    /* Increment selector with presets + custom */
    .increment-selector {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .increment-btn {
      padding: 5px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #888;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .increment-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .increment-btn.active {
      background: rgba(0, 212, 170, 0.2);
      border-color: rgba(0, 212, 170, 0.4);
      color: #00d4aa;
    }

    /* Custom increment input */
    .custom-increment {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .custom-increment input {
      width: 50px;
      padding: 5px 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .custom-increment input:focus {
      outline: none;
      border-color: rgba(0, 212, 170, 0.5);
      background: rgba(0, 212, 170, 0.1);
    }

    .custom-increment input.active {
      border-color: rgba(0, 212, 170, 0.5);
      background: rgba(0, 212, 170, 0.15);
    }

    /* Time threshold selector */
    .time-selector {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .time-btn {
      padding: 5px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #888;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .time-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .time-btn.active {
      background: rgba(0, 212, 170, 0.2);
      border-color: rgba(0, 212, 170, 0.4);
      color: #00d4aa;
    }

    /* Progress bar for watch time */
    .progress-section {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 11px;
      color: #888;
    }

    .progress-label strong {
      color: #00d4aa;
      font-weight: 600;
    }

    .progress-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #00d4aa;
    }

    .progress-bar-container {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4aa, #00a080);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-hint {
      font-size: 9px;
      color: #555;
      margin-top: 6px;
      text-align: center;
    }

    /* Reset Button */
    .reset-btn {
      width: 100%;
      height: 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #666;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .reset-btn:hover {
      background: rgba(255, 82, 82, 0.1);
      border-color: rgba(255, 82, 82, 0.3);
      color: #ff5252;
    }

    /* Status indicator */
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px;
      color: #555;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
    }

    .status-dot.active {
      background: #00d4aa;
      box-shadow: 0 0 8px rgba(0, 212, 170, 0.6);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Toggle switch for progression mode */
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-switch.active {
      background: rgba(0, 212, 170, 0.3);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #666;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .toggle-switch.active::after {
      left: 18px;
      background: #00d4aa;
    }

    .mode-label {
      font-size: 10px;
      color: #666;
    }

    .mode-label.active {
      color: #00d4aa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡</div>
      <div>
        <div class="title">Speed Trainer</div>
        <div class="subtitle">Train your brain for faster playback</div>
      </div>
    </div>

    <div class="speed-display">
      <div class="speed-label">Current Speed</div>
      <div class="speed-value"><span id="speed-int">1</span>.<span id="speed-dec">00</span><span>×</span></div>
    </div>

    <div class="speed-controls">
      <button class="speed-btn decrease" id="btn-decrease">−</button>
      <button class="speed-btn increase" id="btn-increase">+</button>
    </div>

    <!-- Progress toward next speed increase -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">Progress to <strong>next level</strong></span>
        <span class="progress-time" id="progress-time">0:00 / 10:00</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
      </div>
      <div class="progress-hint" id="progress-hint">Watch videos to fill the bar and level up</div>
    </div>

    <div class="settings">
      <!-- Increment setting -->
      <div class="setting-row">
        <div class="setting-label">
          <strong>Step</strong> size
        </div>
        <div class="increment-selector">
          <button class="increment-btn" data-value="0.05">0.05</button>
          <button class="increment-btn" data-value="0.1">0.10</button>
          <button class="increment-btn" data-value="0.2">0.20</button>
          <div class="custom-increment">
            <input type="text" id="custom-increment" placeholder="0.07" maxlength="4">
          </div>
        </div>
      </div>

      <!-- Time threshold setting -->
      <div class="setting-row">
        <div class="setting-label">
          <strong>Level up</strong> every
        </div>
        <div class="time-selector">
          <button class="time-btn" data-value="300">5m</button>
          <button class="time-btn" data-value="600">10m</button>
          <button class="time-btn" data-value="900">15m</button>
          <button class="time-btn" data-value="1800">30m</button>
        </div>
      </div>
    </div>

    <button class="reset-btn" id="btn-reset">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Reset All
    </button>

    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Not on YouTube</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
